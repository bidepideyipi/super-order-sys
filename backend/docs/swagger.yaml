basePath: /api
definitions:
  handler.CreateCategoryRequest:
    properties:
      category_name:
        type: string
    required:
    - category_name
    type: object
  handler.CreateFinancialRequest:
    properties:
      amount_change:
        type: number
      category:
        type: string
      description:
        type: string
    required:
    - amount_change
    - category
    type: object
  handler.CreateOrderItemRequest:
    properties:
      cost_price:
        type: number
      order_id:
        type: integer
      product_name:
        type: string
      quantity:
        minimum: 1
        type: integer
      sale_price:
        type: number
      sku_code:
        type: string
      sku_id:
        type: integer
      total_cost_amount:
        type: number
      total_sale_amount:
        type: number
    required:
    - cost_price
    - order_id
    - product_name
    - quantity
    - sale_price
    - sku_code
    - total_cost_amount
    - total_sale_amount
    type: object
  handler.CreateOrderRequest:
    properties:
      customer_id:
        type: string
      items:
        items:
          $ref: '#/definitions/handler.OrderItemRequest'
        minItems: 1
        type: array
      order_date:
        type: string
      remarks:
        type: string
    required:
    - customer_id
    - items
    - order_date
    type: object
  handler.CreateRequest:
    properties:
      customer_name:
        type: string
    required:
    - customer_name
    type: object
  handler.CreateSKURequest:
    properties:
      box_quantity:
        type: integer
      box_spec:
        type: string
      category_id:
        type: string
      cost_price:
        type: number
      description:
        type: string
      name:
        type: string
      sale_price:
        type: number
      sku_code:
        type: string
      spec:
        type: string
      unit:
        type: string
    required:
    - category_id
    - name
    - sku_code
    type: object
  handler.OrderItemRequest:
    properties:
      cost_price:
        type: number
      product_name:
        type: string
      quantity:
        minimum: 1
        type: integer
      sale_price:
        type: number
      sku_code:
        type: string
      sku_id:
        type: integer
      total_cost_amount:
        type: number
      total_sale_amount:
        type: number
    required:
    - cost_price
    - product_name
    - quantity
    - sale_price
    - sku_code
    - total_cost_amount
    - total_sale_amount
    type: object
  handler.UpdateCategoryRequest:
    properties:
      category_name:
        type: string
    required:
    - category_name
    type: object
  handler.UpdateFinancialRequest:
    properties:
      amount_change:
        type: number
      balance:
        type: number
      category:
        type: string
      description:
        type: string
      is_settled:
        type: boolean
    required:
    - amount_change
    - balance
    - category
    type: object
  handler.UpdateOrderItemRequest:
    properties:
      cost_price:
        type: number
      product_name:
        type: string
      quantity:
        minimum: 1
        type: integer
      sale_price:
        type: number
      settled_amount:
        type: number
      sku_code:
        type: string
      sku_id:
        type: integer
      total_cost_amount:
        type: number
      total_sale_amount:
        type: number
    required:
    - cost_price
    - product_name
    - quantity
    - sale_price
    - sku_code
    - total_cost_amount
    - total_sale_amount
    type: object
  handler.UpdateOrderRequest:
    properties:
      customer_id:
        type: string
      order_date:
        type: string
      remarks:
        type: string
      status:
        type: string
      total_cost_amount:
        type: number
      total_sale_amount:
        type: number
    required:
    - customer_id
    - order_date
    type: object
  handler.UpdateRequest:
    properties:
      customer_name:
        type: string
    required:
    - customer_name
    type: object
  handler.UpdateSKURequest:
    properties:
      box_quantity:
        type: integer
      box_spec:
        type: string
      category_id:
        type: string
      cost_price:
        type: number
      description:
        type: string
      name:
        type: string
      sale_price:
        type: number
      spec:
        type: string
      unit:
        type: string
    required:
    - category_id
    - name
    type: object
  response.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
